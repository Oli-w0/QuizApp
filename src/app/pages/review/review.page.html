<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/history"></ion-back-button>
    </ion-buttons>
    <ion-title>Review</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let question of questions">
      <ion-label>
       <h2 [innerHTML]="question.question"></h2>
        <p>Your answer: <span [innerHTML]="question.userAnswer"></span></p>
        <p>Correct answer: <span [innerHTML]="question.correct_answer"></span></p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
